name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: "10.18.3"
  NODE_VERSION: "22"

jobs:
  prek:
    name: Pre-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: j178/prek-action@v1
        with:
          extra-args: --all-files

  parser:
    name: Parser (grammar verification)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Initialize required submodules
        run: |
          git submodule sync -- refer/BIRD-source-code refer/BIRD-tm-language-grammar refer/BIRD2-vim-grammar
          git submodule update --init --depth 1 refer/BIRD-source-code refer/BIRD-tm-language-grammar refer/BIRD2-vim-grammar
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @birdcc/parser run build:grammar
      - name: Verify tracked files unchanged after grammar generation
        run: git diff --exit-code
      - run: pnpm --filter @birdcc/parser run lint
      - run: pnpm --filter @birdcc/parser run test
      - run: pnpm --filter @birdcc/parser run build
      - run: pnpm --filter @birdcc/parser run typecheck
      - run: pnpm --filter @birdcc/parser run format

  turbo:
    name: Full build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Initialize required submodules
        run: |
          git submodule sync -- refer/BIRD-source-code refer/BIRD-tm-language-grammar refer/BIRD2-vim-grammar
          git submodule update --init --depth 1 refer/BIRD-source-code refer/BIRD-tm-language-grammar refer/BIRD2-vim-grammar
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm format
      - name: Commitlint range
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FROM="${{ github.event.pull_request.base.sha }}"
          else
            FROM="${{ github.event.before }}"
          fi

          if ! git cat-file -e "$FROM^{commit}" 2>/dev/null; then
            FROM="$(git merge-base HEAD "origin/${{ github.event.repository.default_branch }}")"
          fi

          pnpm exec commitlint --config commitlint.config.cjs --from "$FROM" --to "${{ github.sha }}"

  coverage:
    name: Coverage
    needs: turbo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Initialize required submodules
        run: |
          git submodule sync -- refer/BIRD-source-code refer/BIRD-tm-language-grammar refer/BIRD2-vim-grammar
          git submodule update --init --depth 1 refer/BIRD-source-code refer/BIRD-tm-language-grammar refer/BIRD2-vim-grammar
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm coverage
      - name: Upload coverage summaries
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summaries
          path: packages/@birdcc/*/coverage/coverage-summary.json
          if-no-files-found: error

  vscode-e2e-smoke:
    name: VS Code E2E smoke
    needs: turbo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Initialize required submodules
        run: |
          git submodule sync -- refer/BIRD-source-code refer/BIRD-tm-language-grammar refer/BIRD2-vim-grammar
          git submodule update --init --depth 1 refer/BIRD-source-code refer/BIRD-tm-language-grammar refer/BIRD2-vim-grammar
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @birdcc/vscode build
      - run: xvfb-run -a pnpm --filter @birdcc/vscode test:e2e

  vscode-pack-smoke:
    name: VS Code pack smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter bird2-extension-pack marketplace:package

  # Gate check — all required jobs must pass before merging
  ci-ok:
    name: CI OK
    if: always()
    needs: [prek, parser, turbo, coverage, vscode-e2e-smoke, vscode-pack-smoke]
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs
        run: |
          echo "prek: ${{ needs.prek.result }}"
          echo "parser: ${{ needs.parser.result }}"
          echo "turbo: ${{ needs.turbo.result }}"
          echo "coverage: ${{ needs.coverage.result }}"
          echo "vscode-e2e-smoke: ${{ needs.vscode-e2e-smoke.result }}"
          echo "vscode-pack-smoke: ${{ needs.vscode-pack-smoke.result }}"

          if [[ "${{ needs.prek.result }}" != "success" ]] || \
             [[ "${{ needs.parser.result }}" != "success" ]] || \
             [[ "${{ needs.turbo.result }}" != "success" ]] || \
             [[ "${{ needs.coverage.result }}" != "success" ]] || \
             [[ "${{ needs.vscode-e2e-smoke.result }}" != "success" ]] || \
             [[ "${{ needs.vscode-pack-smoke.result }}" != "success" ]]; then
            echo "::error::One or more CI jobs failed"
            exit 1
          fi

          echo "All CI jobs passed!"
