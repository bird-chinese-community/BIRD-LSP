name: CI

on:
  push:
  pull_request:

jobs:
  prek:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: j178/prek-action@v1
        with:
          extra-args: --all-files

  parser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @birdcc/parser run build:grammar
      - name: Verify tracked files unchanged after grammar generation
        run: git diff --exit-code
      - run: pnpm --filter @birdcc/parser run lint
      - run: pnpm --filter @birdcc/parser run test
      - run: pnpm --filter @birdcc/parser run build
      - run: pnpm --filter @birdcc/parser run typecheck
      - run: pnpm --filter @birdcc/parser run format

  turbo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown
      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
      - run: pnpm format
      - name: Commitlint range
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FROM="${{ github.event.pull_request.base.sha }}"
          else
            FROM="${{ github.event.before }}"
          fi

          if ! git cat-file -e "$FROM^{commit}" 2>/dev/null; then
            FROM="$(git merge-base HEAD "origin/${{ github.event.repository.default_branch }}")"
          fi

          pnpm exec commitlint --config commitlint.config.cjs --from "$FROM" --to "${{ github.sha }}"
