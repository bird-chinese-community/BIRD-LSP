name: Publish VS Code Extensions

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: "Version tag for GitHub Release (e.g. v0.3.2). Leave empty to skip GitHub Release."
        required: false
        default: ""
        type: string
      publish_marketplace:
        description: "Publish main extension to VS Code Marketplace"
        required: true
        default: false
        type: boolean
      publish_openvsx:
        description: "Publish main extension to OpenVSX"
        required: true
        default: false
        type: boolean
      publish_pack_marketplace:
        description: "Publish extension pack to VS Code Marketplace"
        required: true
        default: false
        type: boolean
      publish_pack_openvsx:
        description: "Publish extension pack to OpenVSX"
        required: true
        default: false
        type: boolean

jobs:
  package-vsix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Initialize required submodules
        run: |
          git submodule sync -- refer/BIRD-source-code refer/BIRD-tm-language-grammar refer/BIRD2-vim-grammar refer/vscode-bird2
          git submodule update --init --depth 1 refer/BIRD-source-code refer/BIRD-tm-language-grammar refer/BIRD2-vim-grammar refer/vscode-bird2
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown
      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @birdcc/vscode marketplace:package
      - run: pnpm --filter bird2-extension-pack marketplace:package
      - uses: actions/upload-artifact@v4
        with:
          name: bird2-lsp-vsix
          path: packages/@birdcc/vscode/release/bird2-lsp.vsix
          if-no-files-found: error
      - uses: actions/upload-artifact@v4
        with:
          name: bird2-extension-pack-vsix
          path: packages/@birdcc/vscode-pack/release/bird2-extension-pack.vsix
          if-no-files-found: error

  publish-vscode-marketplace:
    needs: package-vsix
    if: ${{ github.event.inputs.publish_marketplace == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: bird2-lsp-vsix
          path: packages/@birdcc/vscode/release
      - run: pnpm --filter @birdcc/vscode marketplace:publish:vsce
        env:
          VSCE_PAT: ${{ secrets.VS_PUBLISH_TOKEN }}

  publish-openvsx:
    needs: package-vsix
    if: ${{ github.event.inputs.publish_openvsx == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: bird2-lsp-vsix
          path: packages/@birdcc/vscode/release
      - run: pnpm --filter @birdcc/vscode marketplace:publish:ovsx
        env:
          OVSX_PAT: ${{ secrets.OPEN_VSX_PUBLISH_TOKEN }}
      - name: Verify OpenVSX publication
        run: node packages/@birdcc/vscode/scripts/verify-openvsx.mjs

  publish-pack-vscode-marketplace:
    needs: package-vsix
    if: ${{ github.event.inputs.publish_pack_marketplace == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: bird2-extension-pack-vsix
          path: packages/@birdcc/vscode-pack/release
      - run: pnpm --filter bird2-extension-pack marketplace:publish:vsce
        env:
          VSCE_PAT: ${{ secrets.VS_PUBLISH_TOKEN }}

  publish-pack-openvsx:
    needs: package-vsix
    if: ${{ github.event.inputs.publish_pack_openvsx == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: bird2-extension-pack-vsix
          path: packages/@birdcc/vscode-pack/release
      - run: pnpm --filter bird2-extension-pack marketplace:publish:ovsx
        env:
          OVSX_PAT: ${{ secrets.OPEN_VSX_PUBLISH_TOKEN }}

  github-release:
    name: Upload VSIX to GitHub Release
    needs: package-vsix
    if: ${{ inputs.version_tag != '' }}
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: bird2-lsp-vsix
          path: ./vsix
      - uses: actions/download-artifact@v4
        with:
          name: bird2-extension-pack-vsix
          path: ./vsix
      - name: Create GitHub Release with VSIX
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version_tag }}
          name: ${{ inputs.version_tag }}
          generate_release_notes: true
          files: |
            ./vsix/bird2-lsp.vsix
            ./vsix/bird2-extension-pack.vsix
          body: |
            ## VS Code Extensions

            | Extension | File |
            |---|---|
            | BIRD2 LSP | `bird2-lsp.vsix` |
            | BIRD2 Extension Pack | `bird2-extension-pack.vsix` |

            ### Install manually

            ```bash
            code --install-extension bird2-lsp.vsix
            code --install-extension bird2-extension-pack.vsix
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
