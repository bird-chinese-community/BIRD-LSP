name: VSCode Marketplace

on:
  workflow_dispatch:
    inputs:
      publish_marketplace:
        description: "Publish to VS Code Marketplace (requires VS_PUBLISH_TOKEN)"
        required: true
        default: false
        type: boolean
      publish_openvsx:
        description: "Publish to OpenVSX (requires OPEN_VSX_PUBLISH_TOKEN)"
        required: true
        default: false
        type: boolean
      publish_pack_marketplace:
        description: "Publish extension pack to VS Code Marketplace (requires VS_PUBLISH_TOKEN)"
        required: true
        default: false
        type: boolean
      publish_pack_openvsx:
        description: "Publish extension pack to OpenVSX (requires OPEN_VSX_PUBLISH_TOKEN)"
        required: true
        default: false
        type: boolean

jobs:
  package-vsix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Initialize required submodules
        run: |
          git submodule sync -- refer/BIRD-source-code refer/BIRD-tm-language-grammar refer/BIRD2-vim-grammar refer/vscode-bird2
          git submodule update --init --depth 1 refer/BIRD-source-code refer/BIRD-tm-language-grammar refer/BIRD2-vim-grammar refer/vscode-bird2
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown
      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @birdcc/vscode marketplace:package
      - run: pnpm --filter bird2-extension-pack marketplace:package
      - uses: actions/upload-artifact@v4
        with:
          name: bird2-lsp-vsix
          path: packages/@birdcc/vscode/release/bird2-lsp.vsix
          if-no-files-found: error
      - uses: actions/upload-artifact@v4
        with:
          name: bird2-extension-pack-vsix
          path: packages/@birdcc/vscode-pack/release/bird2-extension-pack.vsix
          if-no-files-found: error

  publish-vscode-marketplace:
    needs: package-vsix
    if: ${{ github.event.inputs.publish_marketplace == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: bird2-lsp-vsix
          path: packages/@birdcc/vscode/release
      - run: pnpm --filter @birdcc/vscode marketplace:publish:vsce
        env:
          VSCE_PAT: ${{ secrets.VS_PUBLISH_TOKEN }}

  publish-openvsx:
    needs: package-vsix
    if: ${{ github.event.inputs.publish_openvsx == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: bird2-lsp-vsix
          path: packages/@birdcc/vscode/release
      - run: pnpm --filter @birdcc/vscode marketplace:publish:ovsx
        env:
          OVSX_PAT: ${{ secrets.OPEN_VSX_PUBLISH_TOKEN }}
      - name: Verify OpenVSX publication
        run: |
          echo "Waiting for OpenVSX to process the extension..."
          sleep 30
          VERSION=$(jq -r '.version' packages/@birdcc/vscode/package.json)
          for i in {1..12}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://open-vsx.org/api/birdcc/bird2-lsp/${VERSION}")
            if [ "$STATUS" = "200" ]; then
              echo "✓ Extension v${VERSION} verified on OpenVSX"
              exit 0
            fi
            echo "Attempt $i: Extension not yet available (HTTP ${STATUS}), retrying in 10s..."
            sleep 10
          done
          echo "✗ Extension v${VERSION} not found on OpenVSX after 2 minutes"
          echo "The extension may have been rejected by moderation. Check: https://open-vsx.org/extension/birdcc/bird2-lsp"
          exit 1

  publish-pack-vscode-marketplace:
    needs: package-vsix
    if: ${{ github.event.inputs.publish_pack_marketplace == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: bird2-extension-pack-vsix
          path: packages/@birdcc/vscode-pack/release
      - run: pnpm --filter bird2-extension-pack marketplace:publish:vsce
        env:
          VSCE_PAT: ${{ secrets.VS_PUBLISH_TOKEN }}

  publish-pack-openvsx:
    needs: package-vsix
    if: ${{ github.event.inputs.publish_pack_openvsx == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: bird2-extension-pack-vsix
          path: packages/@birdcc/vscode-pack/release
      - run: pnpm --filter bird2-extension-pack marketplace:publish:ovsx
        env:
          OVSX_PAT: ${{ secrets.OPEN_VSX_PUBLISH_TOKEN }}
