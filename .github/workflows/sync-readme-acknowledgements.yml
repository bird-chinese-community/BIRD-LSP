name: Sync README Acknowledgements

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/sync-readme-acknowledgements.yml
      - README.md
      - package.json
      - packages/@birdcc/vscode/README.md
      - tools/config-examples-registry.mjs
      - tools/sync-readme-acknowledgements.mjs
  schedule:
    - cron: "45 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Sync README acknowledgements
        run: node tools/sync-readme-acknowledgements.mjs
      - name: Commit and push updates
        run: |
          if git diff --quiet; then
            echo "No changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md packages/@birdcc/vscode/README.md

          if git diff --staged --quiet; then
            echo "No staged changes detected."
            exit 0
          fi

          git commit -m "chore(sync): update readme acknowledgements [skip ci]"
          git push
