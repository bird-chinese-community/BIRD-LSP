entries:
  - keyword: bgp
    usage: |
      protocol bgp upstream {
        local as 65001;
        neighbor 192.0.2.1 as 64496;
        ipv4 { import all; export filter only_bgp; };
      }
  - keyword: local as
    usage: local as 65001;
  - keyword: multihop
    usage: multihop 2;
  - keyword: neighbor
    usage: neighbor 192.0.2.1 as 64496;
