# Minimal BIRD3 config for CI / local debugging
# Mount your own config to override: -v ./mybird.conf:/etc/bird.conf:ro

log stderr all;
# router id 198.51.100.1;

protocol device {
}

protocol direct {
	disabled;
	ipv4;
	ipv6;
}

protocol kernel {
	ipv4 {
		export all;
	};
}

protocol kernel {
	ipv6 {
		export all;
	};
}

protocol static {
	ipv4;
}
